<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文明跃迁 · 修复版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            font-family: 'Segoe UI', 'Roboto', 'Microsoft YaHei', sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            touch-action: manipulation; /* 提升触摸响应 */
        }

        /* 背景星空 */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 80%, rgba(120,50,150,0.3) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(50,100,200,0.2) 0%, transparent 40%),
                        #000;
            z-index: 0;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 开始屏幕 */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0a2e 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s;
            padding: 20px;
            pointer-events: auto;
        }
        .start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .game-title {
            font-size: 2.8em;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #aa5aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
        }

        .subtitle {
            color: #aaa;
            font-size: 1em;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .start-btn {
            padding: 18px 48px;
            font-size: 1.3em;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 30px 0 20px;
            -webkit-appearance: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .start-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px #00d4ff;
        }

        .tip {
            color: #666;
            font-size: 0.8em;
            text-align: center;
            max-width: 300px;
        }

        /* 开场名言 */
        .quote-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2500;
            opacity: 1;
            transition: opacity 1s;
            pointer-events: none;
            padding: 30px;
        }
        .quote-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .quote-text {
            max-width: 600px;
            font-size: 1.4em;
            color: #fff;
            text-align: center;
            font-style: italic;
            text-shadow: 0 0 15px #00d4ff;
            line-height: 1.5;
        }
        .quote-author {
            margin-top: 20px;
            font-size: 1em;
            color: #aaa;
            text-align: right;
        }

        /* 游戏主界面 */
        #gameContainer {
            display: none;
            width: 100%;
            height: 100vh;
            position: relative;
        }
        #gameContainer.active {
            display: block;
        }

        /* 顶部状态栏 */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,20,0.9);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,212,255,0.3);
            z-index: 100;
            height: 60px;
        }

        .civ-badge {
            display: flex;
            flex-direction: column;
        }
        .civ-name {
            font-size: 1em;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #ff88ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .civ-level {
            font-size: 0.7em;
            color: #aaa;
        }

        .resource-row {
            display: flex;
            gap: 12px;
        }
        .resource-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 75px;
        }
        .resource-icon {
            font-size: 1em;
        }
        .resource-value {
            font-size: 0.9em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        .resource-rate {
            font-size: 0.6em;
            color: #0f0;
        }

        /* 星球点击区 */
        .planet-area {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 35vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .click-planet {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 50px currentColor;
        }
        .click-planet.earth {
            background: radial-gradient(circle at 30% 30%, #4a90e2, #1a5490);
            color: #4a90e2;
        }
        .click-planet:active {
            transform: scale(0.92);
        }
        .click-hint {
            margin-top: 12px;
            color: #aaa;
            font-size: 0.8em;
        }

        /* 底部面板 */
        .bottom-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            top: calc(60px + 35vh);
            background: rgba(10,10,20,0.95);
            border-top: 1px solid #00d4ff;
            overflow-y: auto;
            padding: 12px;
            z-index: 50;
        }

        .section-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 0.9em;
            border-radius: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .tab-btn.active {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            font-weight: bold;
        }

        /* 建筑卡片 */
        .building-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .building-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .building-card:active {
            background: rgba(0,212,255,0.15);
            border-color: #00d4ff;
        }
        .building-card.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .building-icon {
            font-size: 2.2em;
            width: 50px;
            text-align: center;
        }
        .building-info {
            flex: 1;
        }
        .building-name {
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .building-count {
            background: #ff9500;
            color: #000;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: bold;
        }
        .building-desc {
            font-size: 0.75em;
            color: #aaa;
            margin: 4px 0 2px;
        }
        .building-cost {
            font-size: 0.8em;
            color: #ff9500;
        }

        /* 科技卡片 */
        .tech-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tech-card.researched {
            border-color: #0f0;
            background: rgba(0,255,0,0.05);
        }
        .tech-card.locked {
            opacity: 0.4;
        }
        .tech-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a1a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
        }
        .tech-info {
            flex: 1;
        }
        .tech-name {
            font-weight: bold;
        }
        .tech-desc {
            font-size: 0.7em;
            color: #aaa;
        }

        /* 特殊按钮 */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }
        .action-btn {
            padding: 10px 18px;
            background: linear-gradient(90deg, #333, #222);
            border: 1px solid #00d4ff;
            border-radius: 30px;
            color: white;
            font-size: 0.8em;
            cursor: pointer;
        }
        .action-btn.ascend {
            background: linear-gradient(90deg, #ff00ff, #7b2cbf);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #00d4ff; }
            50% { box-shadow: 0 0 20px #ff00ff; }
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 1px solid #00d4ff;
            border-radius: 30px;
            padding: 10px 20px;
            color: white;
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 4000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 20px;
            max-width: 300px;
            border: 1px solid #00d4ff;
        }
    </style>
</head>
<body>
    <!-- 开始屏幕 -->
    <div class="start-screen" id="startScreen">
        <div class="stars" id="startStars"></div>
        <h1 class="game-title">文明跃迁</h1>
        <div class="subtitle">从地球到星辰大海</div>
        <button class="start-btn" id="startBtn">开始文明演化</button>
        <div class="tip">点击星球收集能量 · 建造设施 · 研发科技 · 提升文明等级</div>
    </div>

    <!-- 游戏主容器 -->
    <div id="gameContainer">
        <div class="space-bg"></div>
        <div class="stars" id="gameStars"></div>

        <!-- 顶部状态 -->
        <div class="status-bar">
            <div class="civ-badge">
                <span class="civ-name" id="civName">地球文明</span>
                <span class="civ-level" id="civLevel">0.72级</span>
            </div>
            <div class="resource-row">
                <div class="resource-item">
                    <span class="resource-icon">⚡</span>
                    <span class="resource-value" id="energyVal">1.0K</span>
                    <span class="resource-rate" id="energyRate">+0/s</span>
                </div>
                <div class="resource-item">
                    <span class="resource-icon">🔬</span>
                    <span class="resource-value" id="researchVal">0</span>
                </div>
            </div>
        </div>

        <!-- 星球区域 -->
        <div class="planet-area">
            <div class="click-planet earth" id="planet"></div>
            <div class="click-hint" id="clickHint">点击星球收集能量</div>
        </div>

        <!-- 底部面板 -->
        <div class="bottom-panel" id="bottomPanel">
            <div class="section-tabs">
                <button class="tab-btn active" id="tabBuildings">🏭 设施</button>
                <button class="tab-btn" id="tabTech">🔬 科技</button>
                <button class="tab-btn" id="tabLog">📜 日志</button>
            </div>

            <!-- 建筑列表 -->
            <div id="buildingsPanel" class="building-grid"></div>

            <!-- 科技列表（隐藏） -->
            <div id="techPanel" style="display: none;"></div>

            <!-- 日志（隐藏） -->
            <div id="logPanel" style="display: none; color: #aaa; font-size: 0.8em;"></div>

            <!-- 特殊按钮 -->
            <div class="action-buttons">
                <button class="action-btn" id="ascendBtn" style="display: none;">🚀 文明跃迁</button>
                <button class="action-btn" id="spaceshipBtn" style="display: none;">🛸 星际航行</button>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>

        <!-- 开场名言（会在游戏启动时显示） -->
        <div class="quote-overlay hidden" id="quoteOverlay">
            <div>
                <div class="quote-text">“文明的等级，可以用其能够利用的能量规模来衡量。”</div>
                <div class="quote-author">—— 卡尔达肖夫</div>
            </div>
        </div>

        <!-- 事件/飞船弹窗 (略，可后续扩展) -->
    </div>

    <script>
        (function() {
            // ---------- 数据定义 ----------
            const CIV_DATA = [
                { level: 0.72, name: "地球文明", next: 5000, planetClass: "earth" },
                { level: 1.0, name: "行星文明", next: 25000, planetClass: "fusion" },
                { level: 2.0, name: "恒星文明", next: 100000, planetClass: "dyson" },
                { level: 3.0, name: "星系文明", next: 500000, planetClass: "antimatter" }
            ];

            // 建筑：id, 名称, 图标, 基础成本, 基础能量产出, 描述, 解锁等级
            const BUILDINGS = [
                { id: 'coal', name: '煤矿', icon: '⛏️', baseCost: 50, energy: 5, desc: '化石能源', level: 0 },
                { id: 'oil', name: '油井', icon: '🛢️', baseCost: 80, energy: 8, desc: '石油', level: 0 },
                { id: 'solar', name: '太阳能', icon: '☀️', baseCost: 120, energy: 6, desc: '清洁能源', level: 0 },
                { id: 'wind', name: '风力', icon: '💨', baseCost: 100, energy: 7, desc: '风电', level: 0 },
                { id: 'hydro', name: '水电站', icon: '💧', baseCost: 200, energy: 15, desc: '水力', level: 0.2 },
                { id: 'nuclear', name: '核电站', icon: '☢️', baseCost: 500, energy: 30, desc: '核裂变', level: 0.3 },
                { id: 'fusion', name: '聚变电站', icon: '⚛️', baseCost: 2000, energy: 100, desc: '可控核聚变', level: 1.0 },
                { id: 'dyson', name: '戴森云', icon: '🌐', baseCost: 10000, energy: 500, desc: '戴森球组件', level: 2.0 }
            ];

            // 科技
            const TECHNOLOGIES = [
                { id: 'nuclear_fission', name: '核裂变', icon: '☢️', cost: 500, level: 0.3, desc: '解锁核电站' },
                { id: 'fusion_research', name: '聚变研究', icon: '🔬', cost: 2000, level: 0.9, desc: '解锁聚变电站' },
                { id: 'dyson_tech', name: '戴森球技术', icon: '🌐', cost: 10000, level: 1.8, desc: '解锁戴森云' }
            ];

            // ---------- 游戏主类 ----------
            class Game {
                constructor() {
                    this.energy = 1000;
                    this.research = 0;
                    this.civIndex = 0;          // 当前文明等级索引
                    this.buildings = {};
                    this.technologies = new Set(['nuclear_fission']); // 初始拥有
                    BUILDINGS.forEach(b => this.buildings[b.id] = 0);
                    // 开局给一点初始建筑
                    this.buildings.coal = 5;
                    this.buildings.oil = 3;
                    this.buildings.solar = 2;

                    this.clickPower = 10;
                    this.production = 0;
                    this.consumption = 0;
                    this.lastUpdate = performance.now();

                    this.load();                 // 尝试加载存档
                    this.initStars();
                    this.bindEvents();
                    this.startLoop();
                }

                // 初始化星星
                initStars() {
                    ['startStars', 'gameStars'].forEach(id => {
                        const container = document.getElementById(id);
                        if (!container) return;
                        container.innerHTML = '';
                        for (let i = 0; i < 50; i++) {
                            const s = document.createElement('div');
                            s.className = 'star';
                            s.style.left = Math.random() * 100 + '%';
                            s.style.top = Math.random() * 100 + '%';
                            s.style.width = (Math.random() * 3 + 1) + 'px';
                            s.style.height = s.style.width;
                            s.style.animationDelay = Math.random() * 3 + 's';
                            container.appendChild(s);
                        }
                    });
                }

                // 事件绑定（全部使用addEventListener）
                bindEvents() {
                    // 开始按钮
                    document.getElementById('startBtn').addEventListener('click', (e) => {
                        e.preventDefault();
                        this.startGame();
                    });

                    // 星球点击
                    document.getElementById('planet').addEventListener('click', (e) => {
                        e.preventDefault();
                        this.energy += this.clickPower;
                        this.showToast(`+${this.clickPower} 能量`);
                        this.updateUI();
                    });

                    // 标签切换
                    document.getElementById('tabBuildings').addEventListener('click', () => this.switchTab('buildings'));
                    document.getElementById('tabTech').addEventListener('click', () => this.switchTab('tech'));
                    document.getElementById('tabLog').addEventListener('click', () => this.switchTab('log'));

                    // 跃迁按钮
                    document.getElementById('ascendBtn').addEventListener('click', () => this.ascend());

                    // 防止页面滚动/缩放
                    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
                    document.addEventListener('touchend', e => e.preventDefault(), { passive: false });
                }

                startGame() {
                    // 隐藏开始屏幕
                    document.getElementById('startScreen').classList.add('hidden');
                    document.getElementById('gameContainer').classList.add('active');

                    // 显示开场名言
                    const quote = document.getElementById('quoteOverlay');
                    quote.classList.remove('hidden');
                    setTimeout(() => {
                        quote.classList.add('hidden');
                    }, 1500);

                    this.updateUI();
                }

                switchTab(tab) {
                    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                    document.getElementById('tabBuildings').classList.toggle('active', tab === 'buildings');
                    document.getElementById('tabTech').classList.toggle('active', tab === 'tech');
                    document.getElementById('tabLog').classList.toggle('active', tab === 'log');

                    document.getElementById('buildingsPanel').style.display = tab === 'buildings' ? 'block' : 'none';
                    document.getElementById('techPanel').style.display = tab === 'tech' ? 'block' : 'none';
                    document.getElementById('logPanel').style.display = tab === 'log' ? 'block' : 'none';

                    if (tab === 'tech') this.renderTech();
                }

                // 购买建筑
                buyBuilding(id) {
                    const b = BUILDINGS.find(x => x.id === id);
                    if (!b) return;
                    // 检查文明等级是否足够
                    if (CIV_DATA[this.civIndex].level < b.level) {
                        this.showToast('科技等级不足');
                        return;
                    }

                    const count = this.buildings[id] || 0;
                    const cost = Math.floor(b.baseCost * Math.pow(1.5, count));
                    if (this.energy < cost) {
                        this.showToast('能量不足');
                        return;
                    }

                    this.energy -= cost;
                    this.buildings[id]++;
                    this.showToast(`建造 ${b.name}`);
                    this.updateUI();
                }

                // 研究科技
                researchTech(id) {
                    const t = TECHNOLOGIES.find(x => x.id === id);
                    if (!t) return;
                    if (this.technologies.has(id)) {
                        this.showToast('已研究');
                        return;
                    }
                    if (CIV_DATA[this.civIndex].level < t.level) {
                        this.showToast('文明等级不足');
                        return;
                    }
                    if (this.research < t.cost) {
                        this.showToast('科研点不足');
                        return;
                    }
                    this.research -= t.cost;
                    this.technologies.add(id);
                    this.showToast(`科技完成: ${t.name}`);
                    this.updateUI();
                }

                // 计算净产出
                calcProduction() {
                    let prod = 0;
                    BUILDINGS.forEach(b => {
                        const cnt = this.buildings[b.id] || 0;
                        prod += cnt * b.energy;
                    });
                    this.production = prod;
                    return prod;
                }

                // 游戏主循环（基于时间）
                gameLoop(now) {
                    const dt = Math.min(0.1, (now - this.lastUpdate) / 1000); // 最多0.1秒
                    this.lastUpdate = now;

                    const prod = this.calcProduction();
                    this.energy += prod * dt;
                    if (this.energy < 0) this.energy = 0;

                    // 科研点：来自AI中心（简化版没有AI中心，暂时不自动增加，可通过点击或特殊事件）

                    // 检查是否可跃迁
                    const currentCiv = CIV_DATA[this.civIndex];
                    if (this.energy >= currentCiv.next && this.civIndex < CIV_DATA.length - 1) {
                        document.getElementById('ascendBtn').style.display = 'inline-block';
                    } else {
                        document.getElementById('ascendBtn').style.display = 'none';
                    }

                    this.updateUI();

                    // 自动存档（每30秒）
                    if (Math.floor(now / 1000) % 30 === 0 && Math.floor(this.lastSave || 0) !== Math.floor(now / 1000)) {
                        this.save();
                        this.lastSave = now / 1000;
                    }
                }

                startLoop() {
                    this.lastUpdate = performance.now();
                    const loop = (t) => {
                        this.gameLoop(t);
                        requestAnimationFrame(loop);
                    };
                    requestAnimationFrame(loop);
                }

                // 跃迁
                ascend() {
                    if (this.civIndex >= CIV_DATA.length - 1) return;
                    this.civIndex++;
                    const civ = CIV_DATA[this.civIndex];
                    this.showToast(`晋升至 ${civ.name}`);
                    // 更换星球样式（简单起见，只改颜色）
                    document.getElementById('planet').className = `click-planet ${civ.planetClass}`;
                    document.getElementById('civName').innerText = civ.name;
                    document.getElementById('civLevel').innerText = civ.level + '级';
                    this.updateUI();
                }

                // UI更新
                updateUI() {
                    document.getElementById('energyVal').innerText = this.formatNumber(this.energy);
                    document.getElementById('researchVal').innerText = this.formatNumber(this.research);
                    const rate = this.calcProduction();
                    document.getElementById('energyRate').innerText = (rate >= 0 ? '+' : '') + this.formatNumber(rate) + '/s';
                    
                    // 渲染建筑列表
                    const container = document.getElementById('buildingsPanel');
                    container.innerHTML = '';
                    BUILDINGS.filter(b => b.level <= CIV_DATA[this.civIndex].level + 0.2)
                        .forEach(b => {
                            const count = this.buildings[b.id] || 0;
                            const cost = Math.floor(b.baseCost * Math.pow(1.5, count));
                            const disabled = this.energy < cost ? 'disabled' : '';
                            const card = document.createElement('div');
                            card.className = `building-card ${disabled}`;
                            card.setAttribute('data-id', b.id);
                            card.innerHTML = `
                                <div class="building-icon">${b.icon}</div>
                                <div class="building-info">
                                    <div class="building-name">${b.name} 
                                        ${count > 0 ? `<span class="building-count">${count}</span>` : ''}
                                    </div>
                                    <div class="building-desc">${b.desc} · +${b.energy}⚡/s</div>
                                    <div class="building-cost">⚡ ${this.formatNumber(cost)}</div>
                                </div>
                            `;
                            card.addEventListener('click', (e) => {
                                e.stopPropagation();
                                this.buyBuilding(b.id);
                            });
                            container.appendChild(card);
                        });
                }

                renderTech() {
                    const container = document.getElementById('techPanel');
                    container.innerHTML = '';
                    TECHNOLOGIES.forEach(t => {
                        const researched = this.technologies.has(t.id);
                        const locked = CIV_DATA[this.civIndex].level < t.level ? 'locked' : '';
                        const card = document.createElement('div');
                        card.className = `tech-card ${researched ? 'researched' : locked}`;
                        card.innerHTML = `
                            <div class="tech-icon">${t.icon}</div>
                            <div class="tech-info">
                                <div class="tech-name">${t.name}</div>
                                <div class="tech-desc">${t.desc}</div>
                                ${!researched ? `<div style="color:#7b2cbf;">🔬 ${this.formatNumber(t.cost)}</div>` : '<span style="color:#0f0;">✓ 已研究</span>'}
                            </div>
                        `;
                        if (!researched && !locked) {
                            card.addEventListener('click', () => this.researchTech(t.id));
                        }
                        container.appendChild(card);
                    });
                }

                showToast(msg) {
                    const t = document.getElementById('toast');
                    t.innerText = msg;
                    t.classList.add('show');
                    clearTimeout(this.toastTimer);
                    this.toastTimer = setTimeout(() => t.classList.remove('show'), 1000);
                }

                formatNumber(n) {
                    if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
                    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
                    if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
                    return Math.floor(n);
                }

                // 存档
                save() {
                    const data = {
                        energy: this.energy,
                        research: this.research,
                        civIndex: this.civIndex,
                        buildings: this.buildings,
                        technologies: Array.from(this.technologies)
                    };
                    localStorage.setItem('civSave', JSON.stringify(data));
                }

                // 读档
                load() {
                    const raw = localStorage.getItem('civSave');
                    if (!raw) return;
                    try {
                        const data = JSON.parse(raw);
                        this.energy = data.energy || 1000;
                        this.research = data.research || 0;
                        this.civIndex = data.civIndex || 0;
                        this.buildings = data.buildings || this.buildings;
                        this.technologies = new Set(data.technologies || ['nuclear_fission']);
                    } catch (e) {}
                }
            }

            // 启动游戏
            window.onload = () => {
                window.game = new Game();
            };
        })();
    </script>
</body>
</html>
